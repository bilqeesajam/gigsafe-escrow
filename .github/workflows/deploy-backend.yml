name: Deploy Django Backend to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'backend/gigsafe_backend/settings.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment at $(date)"
            
            # Navigate to project
            cd /home/ec2-user/gigsafe-escrow/backend || exit 1
            
            # Force clean state (ignores local changes, but venv is safe)
            echo "Fetching latest code..."
            git fetch origin
            
            echo "Hard resetting to match GitHub exactly..."
            git reset --hard origin/main
            
            # Restart Django service to load new code
            echo "Restarting Django service..."
            sudo systemctl restart django.service
            
            # Check status
            echo "Service status:"
            sudo systemctl status django.service --no-pager | grep "Active:"
            
            echo "Deployment complete! New code is now live at $(date)"